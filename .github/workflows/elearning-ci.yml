name: eLearning - Services CI

on:
  push:
    paths:
      - "eLearning/ews/**"
      - "eLearning/iws/**"
      - ".github/workflows/elearning-ci.yml"
  pull_request:
    paths:
      - "eLearning/ews/**"
      - "eLearning/iws/**"
      - ".github/workflows/elearning-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [eLearning/ews, eLearning/iws]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.module }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.module }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: ${{ matrix.module }}
        run: python -m unittest discover -s tests -p "test_*.py" -t . -v
